<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookly</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo_navegador.png">
</head>

<body>
    <div class="inicio">
        <div class="logo_inicial">
            <img src="Logo.png" alt="Logo Inicial" width="200px">
            <h1>Bem vindo a sua nova jornada culinária</h1>
        </div>
        <div class="login">
            <h1>Login</h1>
            <div class="email">
                <input type="email" placeholder="Digite o seu email">
            </div>

            <div class="senha">
                <input type="password" placeholder="Digite a sua senha">
            </div>

            <div class="esqueci_senha">

                <a href="recuperar-senha">Esqueci minha senha </a>
            </div>

            <div class="entrar">
                <button>Entrar</button>
            </div>

            <div class="ou">
                <div class="linha"></div>
                <span>ou</span>
                <div class="linha"></div>
            </div>

            <div class="logo_redes">
                <i class="mdi mdi-google"></i>
                <i class="mdi mdi-facebook"></i>
                <i class="mdi mdi-apple"></i>
            </div>

            <div class="cadastro">
                <p>Não tem uma conta? <a href="cadastrar">Cadastrar</a></p>
            </div>
        </div>
    </div>
</body>

</html>
